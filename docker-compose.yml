# This compose file is intentionally isolated from any existing stack on the VPS.
# It uses a unique container name, network name, and loopback-only host binding.
# Project naming is provided via `docker-compose -p ...` for compatibility with Compose v1 and v2.

services:
  web:
    container_name: auscham_missioncontrol_web
    image: auscham/missioncontrol-site:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BUILD_SHA: ${NEXT_PUBLIC_BUILD_SHA:-dev}
    env_file:
      - deploy/.env.production
    environment:
      NODE_ENV: production
      PORT: ${APP_PORT:-3008}
      APP_BUILD_SHA: ${NEXT_PUBLIC_BUILD_SHA:-dev}
    ports:
      # Bind on localhost only so only host Nginx can access this app.
      # This avoids exposing another public port and prevents collisions with other projects.
      - '127.0.0.1:${HOST_BIND_PORT:-3008}:${APP_PORT:-3008}'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - "http://127.0.0.1:${APP_PORT:-3008}/api/health" >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - auscham_missioncontrol_net

networks:
  auscham_missioncontrol_net:
    name: auscham_missioncontrol_network

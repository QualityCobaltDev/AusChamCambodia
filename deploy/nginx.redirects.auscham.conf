# Redirect and retired-URL rules for the AusCham migration.
# Include this file inside the `server` block for elevareai.online.
# Example: include /etc/nginx/snippets/auscham-migration-redirects.conf;

# --- 410 Gone rules (do not redirect) ---
location = /feed { return 410; }
location = /comments/feed { return 410; }
location = /xmlrpc.php { return 410; }
location = /wp-login.php { return 410; }
location ^~ /wp-admin/ { return 410; }
location ^~ /wp-content/ { return 410; }
location ^~ /wp-includes/ { return 410; }
location ^~ /author/ { return 410; }
location ^~ /tag/ { return 410; }
location ^~ /category/uncategorized/ { return 410; }

# Date-based archive URLs (legacy WordPress-like)
rewrite ^/\d{4}/\d{2}/\d{2}/.+$ /gone break;
location = /gone { return 410; }

# --- 301 Legacy redirects ---
location = /home { return 301 /; }
location = /index.php { return 301 /; }
location = /index.html { return 301 /; }


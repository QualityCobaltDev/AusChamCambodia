# Dedicated Nginx vhost for the AusCham rebuild.
# Safe coexistence note:
# - This file is host-based (missioncontrol.quest only)
# - It proxies only to localhost:3008 for the isolated Docker stack
# - It does not alter global nginx.conf and does not touch other vhosts
server {
    listen 80;
    listen [::]:80;
    server_name missioncontrol.quest www.missioncontrol.quest;

    location / {
        proxy_pass http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

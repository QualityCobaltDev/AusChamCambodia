# Dedicated Nginx vhost for the AusCham rebuild.
# Safe coexistence note:
# - Host-based routing only for missioncontrol.quest and www.missioncontrol.quest
# - Proxies exclusively to localhost:3008 (isolated Docker stack)
# - Does not modify /etc/nginx/nginx.conf or any existing live vhost

# Map is placed in http context when this file is included from nginx.conf.
# It enables WebSocket-friendly Connection header handling.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name missioncontrol.quest www.missioncontrol.quest;

    # ACME HTTP-01 challenge path for Certbot renewal/issuance.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Enforce HTTPS for all non-ACME requests.
    location / {
        return 301 https://missioncontrol.quest$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name missioncontrol.quest;

    # Certbot-managed certificate files (generated after issuance).
    ssl_certificate /etc/letsencrypt/live/missioncontrol.quest/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/missioncontrol.quest/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Basic performance settings.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;

    # Conservative request size; adjust only when needed.
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3008;
        proxy_http_version 1.1;

        # Preserve incoming host and client addressing.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / streaming support.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_redirect off;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.missioncontrol.quest;

    ssl_certificate /etc/letsencrypt/live/missioncontrol.quest/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/missioncontrol.quest/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Canonicalize www to apex.
    return 301 https://missioncontrol.quest$request_uri;
}

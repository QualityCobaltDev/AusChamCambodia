# Legacy path retained for compatibility with older automation.
name: auscham_missioncontrol

services:
  web:
    container_name: auscham_missioncontrol_web
    image: auscham/missioncontrol-site:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BUILD_SHA: ${NEXT_PUBLIC_BUILD_SHA:-dev}
    env_file:
      - ../deploy/.env.production
    environment:
      NODE_ENV: production
      PORT: ${APP_PORT:-3008}
      APP_BUILD_SHA: ${NEXT_PUBLIC_BUILD_SHA:-dev}
    ports:
      - '127.0.0.1:${HOST_BIND_PORT:-3008}:${APP_PORT:-3008}'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:' + (process.env.APP_PORT || '3008') + '/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - auscham_missioncontrol_net

networks:
  auscham_missioncontrol_net:
    name: auscham_missioncontrol_network
